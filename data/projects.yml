  - name: Trailhead
    where: Open source
    period: 2024 - present
    role: Author
    blurb: >
      I was building a whole product solo and my AI tooling kept getting in the
      way, so I built my own. lore hands Claude Code the right context for each
      task; forge orchestrates subagents across planning, building, and review;
      camp spins up a full dev environment per git worktree - backend, web app,
      and iOS simulator wired together - so I could run dozens of features at once.
      It's what let me ship solo, and I'm open-sourcing it for anyone stuck
      fighting the same fight.
