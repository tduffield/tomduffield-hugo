# Site settings
baseurl = "https://www.tomduffield.com"
locale = "en-us"
title = "Tom Duffield"
# Self-contained layouts live in /layouts; no external theme.
googleAnalytics = ""
enableRobotsTXT = true

[menu]
  [[menu.main]]
    identifier = "built"
    name = "Built"
    weight = -120
    url = "/#built"
  [[menu.main]]
    identifier = "writing"
    name = "Writing"
    weight = -110
    url = "/posts/"
  [[menu.main]]
    identifier = "talks"
    name = "Talks"
    weight = -100
    url = "/presentations/"

[params]
  name = "Tom Duffield"
  # Monogram shown as the nav logo mark (keeps the name out of the nav twice).
  monogram = "TD"
  # Mono eyebrow line above the name in the hero.
  role = "Software engineer & builder"
  # Availability pill in the hero. Empty string hides it (clear it once you land).
  status = "Available for new work"
  # One-line identity, shown under the name in the hero.
  tagline = 'I build software for <span class="tagline-em">people</span>.'
  # Short hero blurb, in Tom's voice. Plain, concrete, no buzzwords.
  # Availability is carried by the status pill, so the intro stays about the work.
  intro = "I have a habit of finding whatever's slowing everyone down and building a way out of it - then handing it over to whoever else is stuck. Most of what I've made started as a selfish fix for my own bad day, before it turned into everyone's."
  location = "Minneapolis, MN"
  # A small, honest sign-off in the footer. Encapsulates the off-screen builder.
  craftNote = "Off the keyboard, I build things out of wood."
  # Public contact. Drop a curated PDF in static/files/ and point resumeURL at it
  # to surface a Resume link in the hero; leave empty to hide it.
  email = "tom.duffield@gmail.com"
  resumeURL = ""
  description = "Tom Duffield is a software engineer and builder in Minneapolis who ships products end-to-end - from AI consumer-health to org-wide CI/CD."

# Footer + hero social links. Order here is the order rendered.
[params.social]
  github = "https://github.com/tduffield"
  linkedin = "https://www.linkedin.com/in/thomasduffield/"
  email = "mailto:tom.duffield@gmail.com"

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]
  tag = "tags"
