<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body class="{{ if .IsHome }}is-home{{ else }}is-inner{{ end }}">
    {{ partial "nav.html" . }}
    <main id="content">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "site-footer.html" . }}
  </body>
</html>
