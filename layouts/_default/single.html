{{ define "main" }}
<article class="post wrap">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    {{ with .Description }}<p class="post-subtitle">{{ . | markdownify }}</p>{{ end }}
    <p class="post-byline">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
      {{ with .Params.tags }} ·
        {{ range . }}<a class="tag" href="{{ "tags/" | absURL }}{{ . | urlize }}/">{{ . }}</a> {{ end }}
      {{ end }}
    </p>
  </header>
  <div class="post-body">
    {{ .Content }}
  </div>
  <footer class="post-footer">
    <a href="{{ "/posts/" | absURL }}">← All writing</a>
  </footer>
</article>
{{ end }}
